version: '3.8'

services:
  # Database Service (PostgreSQL)
  postgres:
    image: postgres:16-alpine
    container_name: ims_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: ims_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Database UI (pgAdmin) - Optional, for viewing DB in browser
  pgadmin:
    image: dpage/pgadmin4
    container_name: ims_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ims.com
      PGADMIN_DEFAULT_PASSWORD: password123
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
